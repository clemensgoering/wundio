name: Wundio CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: Python Tests (Pi mock)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: core/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r core/requirements.txt
          pip install pytest pytest-cov httpx ruff

      - name: Lint
        run: ruff check core/ --ignore E501

      - name: Run tests
        run: |
          PYTHONPATH=core pytest tests/ -v \
            --cov=core \
            --cov-report=term-missing \
            --cov-report=xml \
            -p no:warnings

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  validate-scripts:
    name: Shell Script Syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          for f in scripts/*.sh; do
            # Skip files that aren't bash (e.g. Python scripts with .sh extension)
            first_line=$(head -1 "$f")
            if echo "$first_line" | grep -qE "^#!.*(python|python3)"; then
              echo "Skipping non-bash script: $f"
              continue
            fi
            echo "Checking $f..."
            bash -n "$f" || exit 1
          done
          echo "All scripts OK"

  sync-website:
    name: Sync scripts to wundio-website
    runs-on: ubuntu-latest
    needs: [test-core, validate-scripts]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Non-blocking: website repo may not exist yet or token may not be configured
    continue-on-error: true

    steps:
      - name: Check if WEBSITE_REPO_TOKEN is configured
        id: check-token
        run: |
          if [ -z "${{ secrets.WEBSITE_REPO_TOKEN }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "WEBSITE_REPO_TOKEN not set – skipping sync"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger wundio-website script sync
        if: steps.check-token.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          script: |
            try {
              await github.rest.repos.createDispatchEvent({
                owner: 'clemensgoering',
                repo:  'wundio-website',
                event_type: 'scripts-updated',
                client_payload: {
                  sha:     context.sha,
                  ref:     context.ref,
                  run_id:  context.runId.toString(),
                }
              });
              console.log('Dispatch sent to wundio-website');
            } catch (error) {
              if (error.status === 404) {
                core.warning('wundio-website repo not found or token lacks access. Create the repo first: https://github.com/new');
              } else {
                throw error;
              }
            }